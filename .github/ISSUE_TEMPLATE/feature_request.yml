name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: A clear description of the pain point or limitation.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Sync / core logic
        - Setup wizard
        - Preview command
        - Config management
        - Tempo API integration
        - Jira API integration
        - Dyce API integration
        - CLI / UX
        - Documentation
        - Other
    validations:
      required: true
